<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
</head>
<body>
    <h1>Welcome!</h1>
    <p>You have been granted access to our platform.</p>
    <p>Please create an account</p>
    <input type="text" placeholder="Enter username">
    <input type="password" placeholder="Enter password">
    <input type="file" placeholder="Upload your profile picture">
    <button>Sign up!</button>
</body>
</html>

<!-- input = Text field
button = Clickable button
types of input = text, password, file, date, email, number, color etc. -->
