<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Beijing Olympics</h1>
    <ol>
        <li>Norway</li>
        <li>Germany</li>
        <li>China</li>
        <li>United States</li>
    </ol>
</body>
</html>

<!-- ol = ordered list
li = list item
ul = unordered list
-->
